<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        try {
          var root = document.documentElement;
          var stored =
            localStorage.getItem("theme") ||
            localStorage.getItem("heroui-theme") ||
            localStorage.getItem("next-theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored;

          if (theme === "system" || !theme) {
            theme = prefersDark ? "dark" : "light";
          }

          if (theme === "dark") {
            root.classList.add("dark");
            root.style.colorScheme = "dark";
            root.style.backgroundColor = "#000000";
          } else if (theme === "light") {
            root.classList.remove("dark");
            root.style.colorScheme = "light";
            root.style.backgroundColor = "#ffffff";
          }
          
        } catch (_) {
          // Ignore storage/matchMedia errors and keep default rendering.
        }
      })();
    </script>

    <!--
      Fallback only, react helmet should inject the correct titles and tags
    -->
    <title>Asa Masterson — Software Developer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap"
    />

    <!-- Schema.org structured data is injected per-page via SEOHead (see src/seo/meta.ts).
         The home page includes the full @graph with Person, WebSite, and ItemList schemas. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
