server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mime types are inherited from the nginx:alpine base image's
    # /etc/nginx/nginx.conf http block — no need to redeclare here.
    # default_type catches anything not in mime.types
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Cache static assets (JS/CSS get hashed filenames from Vite so 1yr is fine)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
        log_not_found off;
    }

    # robots.txt and sitemap — no cache so Google always gets fresh copy
    location = /robots.txt {
        expires -1;
        add_header Cache-Control "no-store";
    }
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # SSG pages — exact matches serve the pre-rendered HTML for each route
    location = / {
        try_files /index.html =404;
    }
    location = /about {
        try_files /about/index.html =404;
    }
    location = /about/ {
        try_files /about/index.html =404;
    }
    location = /projects {
        try_files /projects/index.html =404;
    }
    location = /projects/ {
        try_files /projects/index.html =404;
    }
    location = /pacman {
        try_files /pacman/index.html =404;
    }
    location = /pacman/ {
        try_files /pacman/index.html =404;
    }
    location = /pong {
        try_files /pong/index.html =404;
    }
    location = /pong/ {
        try_files /pong/index.html =404;
    }
    location = /2048 {
        try_files /2048/index.html =404;
    }
    location = /2048/ {
        try_files /2048/index.html =404;
    }
    location = /battleships {
        try_files /battleships/index.html =404;
    }
    location = /battleships/ {
        try_files /battleships/index.html =404;
    }
    location = /dots-and-boxes {
        try_files /dots-and-boxes/index.html =404;
    }
    location = /dots-and-boxes/ {
        try_files /dots-and-boxes/index.html =404;
    }
    location = /block-dash {
        try_files /block-dash/index.html =404;
    }
    location = /block-dash/ {
        try_files /block-dash/index.html =404;
    }

    # Fallback — serve root SPA for any unmatched path (React Router wildcard handles the rest)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
