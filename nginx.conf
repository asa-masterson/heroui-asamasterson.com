server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mime types are inherited from the nginx:alpine base image's
    # /etc/nginx/nginx.conf http block — no need to redeclare here.
    # default_type catches anything not in mime.types
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Cache static assets (JS/CSS get hashed filenames from Vite so 1yr is fine)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
        log_not_found off;
    }

    # /ping — lightweight uptime check, served from static file so nginx + file serving must both be up
    location = /ping {
        alias /usr/share/nginx/html/ping;
        default_type "text/plain; charset=utf-8";
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
    }

    # robots.txt and sitemap — no cache so Google always gets fresh copy
    location = /robots.txt {
        expires -1;
        add_header Cache-Control "no-store";
    }
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # SSG pages — exact matches serve the pre-rendered HTML for each route
    location = / {
        try_files /index.html =404;
    }
    location = /about {
        try_files /about/index.html =404;
    }
    location = /about/ {
        try_files /about/index.html =404;
    }
    location = /projects {
        try_files /projects/index.html =404;
    }
    location = /projects/ {
        try_files /projects/index.html =404;
    }
    location = /projects/pacman {
        try_files /projects/pacman/index.html =404;
    }
    location = /projects/pacman/ {
        try_files /projects/pacman/index.html =404;
    }
    location = /projects/pong {
        try_files /projects/pong/index.html =404;
    }
    location = /projects/pong/ {
        try_files /projects/pong/index.html =404;
    }
    location = /projects/2048 {
        try_files /projects/2048/index.html =404;
    }
    location = /projects/2048/ {
        try_files /projects/2048/index.html =404;
    }
    location = /projects/battleships {
        try_files /projects/battleships/index.html =404;
    }
    location = /projects/battleships/ {
        try_files /projects/battleships/index.html =404;
    }
    location = /projects/dots-and-boxes {
        try_files /projects/dots-and-boxes/index.html =404;
    }
    location = /projects/dots-and-boxes/ {
        try_files /projects/dots-and-boxes/index.html =404;
    }
    location = /projects/block-dash {
        try_files /projects/block-dash/index.html =404;
    }
    location = /projects/block-dash/ {
        try_files /projects/block-dash/index.html =404;
    }
    location = /404 {
        try_files /404/index.html =500;
    }
    location = /404/ {
        try_files /404/index.html =500;
    }

    # Serve the custom 404 page (with 404 status) for any unmatched path
    error_page 404 =404 /404/index.html;

    # Fallback — return 404 for any path not matched by the exact location blocks above
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
