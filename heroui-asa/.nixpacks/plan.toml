# Additional Nixpacks configuration

# Specify exact Node.js version
[phases.setup]
nixPkgs = [
  { pkg = "nodejs", version = "18" },
  { pkg = "nginx" }
]

# Environment variables for the entire build process
[variables]
NODE_ENV = "development"

# Override environment variables for specific phases
[phases.build.variables]
NODE_ENV = "production"

# Add custom setup commands
[phases.setup.cmds]
"create-nginx-dirs" = "mkdir -p /etc/nginx/conf.d"

# Add custom cleanup commands
[phases.build.cmds]
"build-app" = "npm run build"
"copy-nginx-conf" = "cp nginx.conf /etc/nginx/conf.d/default.conf"
"cleanup" = "npm cache clean --force"