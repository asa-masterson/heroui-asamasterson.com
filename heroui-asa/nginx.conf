# Optimize worker processes - auto detects the number of CPU cores
worker_processes auto;
worker_rlimit_nofile 65535;

# Optimize events module
events {
    multi_accept on;
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Optimize buffer sizes
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    # File cache settings
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Enable gzip compression with optimized settings
        gzip on;
        gzip_comp_level 4;  # Reduced from 5 to save CPU
        gzip_min_length 256;
        gzip_proxied any;
        gzip_vary on;
        gzip_types
            application/javascript
            application/json
            application/x-javascript
            application/xml
            application/xml+rss
            image/svg+xml
            text/css
            text/javascript
            text/plain
            text/xml;

        # Cache static assets with longer expiry
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
            expires 60d;  # Increased from 30d
            add_header Cache-Control "public, no-transform, max-age=5184000";
            access_log off;  # Disable access logs for static content
            log_not_found off;
        }

        # Handle SPA routing - serve index.html for any path that doesn't exist
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
    }
}
