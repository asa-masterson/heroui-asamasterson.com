providers = ["node"]

[phases.setup]
nixPkgs = [{ pkg = "nodejs", version = "20" }]
cmds = ["npm install -g npm@latest"]

[phases.install]
cmds = ["npm install --no-fund --no-audit --production=false --verbose"]
env = { NODE_ENV = "development" }

[phases.build]
cmds = ["npm run build"]
env = { NODE_ENV = "production" }
